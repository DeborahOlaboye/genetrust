# git-cliff configuration — automated CHANGELOG generation
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to GeneTrust are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

---
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}

### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}
"""
trim = true
footer = """
{% for release in releases %}\
{% if release.version %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/DeborahOlaboye/genetrust/compare/{{ release.previous.version }}...{{ release.version }}
{% else %}\
[Unreleased]: https://github.com/DeborahOlaboye/genetrust/compare/{{ release.previous.version }}...HEAD
{% endif %}\
{% endfor %}
"""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^refactor", group = "Changed" },
  { message = "^perf", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^chore\\(deps\\)", group = "Dependencies" },
  { message = "^chore", skip = true },
  { message = "^test", skip = true },
  { message = "^ci", skip = true },
  { body = ".*security", group = "Security" },
]

protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
sort_commits = "oldest"
