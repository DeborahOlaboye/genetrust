name: Install GeneTrust SDK

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install genetrust-sdk 10 times
        run: |
          for i in {1..10}; do
            echo "Installing SDK - Attempt $i of 10"
            npm install genetrust-sdk
          done
